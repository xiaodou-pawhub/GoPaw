name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # 前端构建（只需构建一次）
  # ============================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Build frontend
        run: cd web && bun run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          retention-days: 1

  # ============================================
  # 多平台二进制构建
  # ============================================
  build-binaries:
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ''
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: ''
          # Windows
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            suffix: '.exe'
          # macOS
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: ''
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w -X main.appVersion=${{ steps.version.outputs.VERSION }}" \
            -o gopaw${{ matrix.suffix }} \
            ./cmd/gopaw

      - name: Prepare release package
        run: |
          mkdir -p _release
          cp gopaw${{ matrix.suffix }} _release/
          cp config.yaml.example _release/ 2>/dev/null || true
          cp -r docker _release/ 2>/dev/null || true
          
          # Create archive
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd _release && zip -r ../gopaw-${{ matrix.goos }}-${{ matrix.goarch }}.zip .
          else
            tar -czf gopaw-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C _release .
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gopaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gopaw-*.tar.gz
            gopaw-*.zip
          retention-days: 1

  # ============================================
  # Docker 镜像构建（仅 Linux amd64/arm64）
  # ============================================
  build-docker:
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Linux binary for Docker
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -ldflags "-s -w -X main.appVersion=${{ steps.version.outputs.VERSION }}" \
            -o gopaw \
            ./cmd/gopaw

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/xiaodou-pawhub/gopaw:${{ steps.version.outputs.VERSION }}
            ghcr.io/xiaodou-pawhub/gopaw:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 创建 GitHub Release
  # ============================================
  create-release:
    needs: [build-binaries, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          find artifacts -name "*.zip" -exec cp {} release/ \;
          ls -la release/

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG=Initial release" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GoPaw ${{ github.ref_name }}
          body: |
            ## 🚀 GoPaw ${{ steps.version.outputs.VERSION }}
            
            ### 📦 下载
            
            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | amd64 | gopaw-linux-amd64.tar.gz |
            | Linux | arm64 | gopaw-linux-arm64.tar.gz |
            | Windows | amd64 | gopaw-windows-amd64.zip |
            | macOS | amd64 (Intel) | gopaw-darwin-amd64.tar.gz |
            | macOS | arm64 (M1/M2) | gopaw-darwin-arm64.tar.gz |
            
            ### 🐳 Docker
            
            ```bash
            docker pull ghcr.io/xiaodou-pawhub/gopaw:${{ steps.version.outputs.VERSION }}
            ```
            
            ### 📝 更新日志
            
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### 📖 文档
            
            - [部署文档](https://github.com/xiaodou-pawhub/gopaw/blob/main/docker/DEPLOY.md)
            - [配置示例](https://github.com/xiaodou-pawhub/gopaw/blob/main/config.yaml.example)
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
          fail_on_unmatched_files: false