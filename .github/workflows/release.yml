name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd web && pnpm run build

      - name: Build Go binary (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.appVersion=${{ steps.version.outputs.VERSION }}" \
            -o gopaw \
            ./cmd/gopaw

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t gopaw:${{ steps.version.outputs.VERSION }} \
            -t gopaw:latest \
            -f docker/Dockerfile .

      - name: Save Docker image as tar.gz
        run: |
          docker save gopaw:${{ steps.version.outputs.VERSION }} \
            | gzip > gopaw-docker-linux-amd64.tar.gz

      - name: Package binary release
        run: |
          mkdir -p _release
          cp gopaw _release/
          cp docker/Dockerfile _release/
          cp docker/docker-compose.yml _release/
          cp docker/Dockerfile.chrome _release/
          cp docker/DEPLOY.md _release/
          cp config.yaml.example _release/
          tar -czf gopaw-linux-amd64.tar.gz -C _release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GoPaw ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            gopaw-linux-amd64.tar.gz
            gopaw-docker-linux-amd64.tar.gz
