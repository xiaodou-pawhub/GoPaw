# ─────────────────────────────────────────────────────────────────────────────
# GoPaw docker-compose（本地自建模式）
#
# 适用场景：无法访问外网/Docker Registry 的服务器，使用发布包自行构建镜像。
#
# 前置：解压发布包，在同目录执行构建
#   docker build -t gopaw:latest .
#
# 基础启动（不含浏览器）：
#   docker compose up -d
#
# 含浏览器控制工具（首次需先构建 chrome sidecar）：
#   docker compose --profile browser build
#   docker compose --profile browser up -d
#
# 如果能访问外网，推荐使用 docker-compose.online.yml 直接拉取镜像。
# admin_token 等敏感配置直接写在 config.yaml 中（已在 .gitignore 内）。
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── GoPaw 主服务 ──────────────────────────────────────────────────────────
  gopaw:
    image: gopaw:latest
    # 必要的 Linux capabilities，用于文件操作等系统任务
    cap_add:
      - CHOWN        # 允许修改文件所有者
      - SETUID       # 允许设置用户 ID
      - SETGID       # 允许设置组 ID
      - DAC_OVERRIDE # 允许读写任何文件（系统任务需要）
    
    # 容器运行用户
    # 0:0 表示以 root 启动，初始化时会自动修复挂载目录权限
    # 初始化完成后会自动降权为 node 用户运行服务
    user: "0:0"
    
    ports:
      - '8088:8088'
    volumes:
      # 配置文件：只读挂载，修改后需重启生效
      - ./config.yaml:/app/config.yaml:ro
      # 持久化数据：SQLite 数据库、记忆文件等（首次启动自动创建目录）
      - ./data:/app/data
      # 应用日志（首次启动自动创建目录）
      - ./logs:/app/logs
      # 技能目录在工作区的 skills/ 子目录下，随 data 一并挂载
    environment:
      # 浏览器控制：连接 chrome sidecar（启用 --profile browser 时生效）
      - CHROME_URL=ws://chrome:9222
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8088/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Headless Chrome sidecar（可选，browser_control 工具依赖）─────────────
  # 仅在使用 --profile browser 时启动：docker compose --profile browser up -d
  # 使用自定义镜像（基于 chromedp/headless-shell），已预装 Noto CJK 字体
  # 首次启动需构建：docker compose --profile browser build
  chrome:
    build:
      context: .
      dockerfile: ./Dockerfile.chrome
    profiles:
      - browser
    # Chrome 需要足够的共享内存，否则页面渲染可能崩溃
    shm_size: '256mb'
    # CDP 端口仅容器内网络可访问，不对外暴露
    expose:
      - '9222'
    restart: unless-stopped
